<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Brand Sculptors | Content Conversion System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Build a brand where trust compounds into qualified leads. A done-with-you content system for experts and founders.">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-primary': 'var(--bg-primary)',
                        'bg-surface': 'var(--bg-surface)',
                        'bg-elevated': 'var(--bg-elevated)',
                        'border': 'var(--border)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'text-tertiary': 'var(--text-tertiary)',
                        'accent': 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)',
                        'accent-subtle': 'var(--accent-subtle)',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                        mono: ['"SF Mono"', 'ui-monospace', '"Cascadia Code"', 'monospace'],
                    },
                    boxShadow: {
                        'apple': 'var(--apple-shadow)',
                    },
                    animation: {
                        blob: "blob 15s infinite alternate",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(40px, -60px) scale(1.15)" },
                            "66%": { transform: "translate(-30px, 30px) scale(0.85)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
      :root {
        --bg-primary: #F5F5F7;
        --bg-surface: #FFFFFF;
        --bg-elevated: #FFFFFF;
        --border: #D2D2D7;
        --text-primary: #1D1D1F;
        --text-secondary: #3A3A3C;
        --text-tertiary: #636366;
        --accent: #003D99;
        --accent-hover: #004DBF;
        --accent-subtle: rgba(0, 61, 153, 0.08);
        --apple-shadow: 0 4px 24px rgba(0,0,0,0.06);
      }

      .dark {
        --bg-primary: #000000;
        --bg-surface: #0A0A0A;
        --bg-elevated: #141414;
        --border: #2A2A2E;
        --text-primary: #F5F5F7;
        --text-secondary: #D1D1D6;
        --text-tertiary: #98989D;
        --accent: #2997FF;
        --accent-hover: #0077ED;
        --accent-subtle: rgba(41, 151, 255, 0.12);
        --apple-shadow: 0 4px 24px rgba(255,255,255,0.03);
      }

      html {
        scroll-behavior: smooth;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      body {
        font-weight: 450;
      }
    }

    @layer utilities {
      .text-display {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
        font-weight: 700;
      }
      .text-h2 {
        font-size: clamp(1.75rem, 3.5vw, 3rem);
        letter-spacing: -0.02em;
        line-height: 1.15;
        font-weight: 600;
      }
      .text-h3 {
        font-size: clamp(1.25rem, 2vw, 1.75rem);
        letter-spacing: -0.02em;
        line-height: 1.3;
        font-weight: 600;
      }
      .text-body {
        font-size: 1.125rem;
        line-height: 1.7;
        letter-spacing: -0.01em;
      }
      .text-small {
        font-size: 0.875rem;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
    }

    .noise-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 50;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    .dark .noise-bg {
      opacity: 0.05;
      mix-blend-mode: overlay;
    }

    .glow-word {
      color: #003D99;
      font-weight: 800;
    }
    .dark .glow-word {
      color: #FF7A00;
      text-shadow: 0 0 20px rgba(255, 122, 0, 0.35), 0 0 40px rgba(255, 122, 0, 0.15);
    }

    .glow-underline {
      position: relative;
      display: inline;
    }
    .glow-underline::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 3px;
      background: #FF7A00;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(255, 122, 0, 0.5), 0 0 20px rgba(255, 122, 0, 0.25);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .faq-answer.open {
      max-height: 600px;
      opacity: 1;
    }

    /* Neumorphic Design System */
    .neu-card {
      background: #EEEEF3;
      border-radius: 20px;
      box-shadow: 6px 6px 14px rgba(0,0,0,0.07), -4px -4px 10px rgba(255,255,255,0.85);
      padding: 1.5rem 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .dark .neu-card {
      background: #1A1A1E;
      box-shadow: 6px 6px 14px rgba(0,0,0,0.4), -4px -4px 10px rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .neu-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #E8E8ED;
      border-radius: 999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-secondary);
      box-shadow: 3px 3px 8px rgba(0,0,0,0.06), -2px -2px 6px rgba(255,255,255,0.8);
    }
    .dark .neu-pill {
      background: #222226;
      color: var(--text-secondary);
      box-shadow: 3px 3px 8px rgba(0,0,0,0.3), -2px -2px 6px rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .neu-pill-accent {
      background: var(--accent);
      color: #fff;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.1), -2px -2px 6px rgba(255,255,255,0.6);
    }
    .dark .neu-pill-accent {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px rgba(41,151,255,0.25), 3px 3px 8px rgba(0,0,0,0.3);
      border: none;
    }

    .neu-pill-danger {
      background: #FFE5E5;
      color: #CC3333;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.06), -2px -2px 6px rgba(255,255,255,0.8);
    }
    .dark .neu-pill-danger {
      background: rgba(204, 51, 51, 0.15);
      color: #FF6B6B;
      box-shadow: 0 0 15px rgba(204,51,51,0.15), 3px 3px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(204,51,51,0.2);
    }

    .neu-line {
      width: 3px;
      background: linear-gradient(to bottom, var(--accent), rgba(41,151,255,0.1));
      border-radius: 999px;
    }
    .dark .neu-line {
      background: linear-gradient(to bottom, var(--accent), rgba(41,151,255,0.05));
      box-shadow: 0 0 8px rgba(41,151,255,0.1);
    }

    .neu-stat-card {
      background: #EEEEF3;
      border-radius: 16px;
      padding: 1.25rem 1.75rem;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.06), -3px -3px 8px rgba(255,255,255,0.8), inset 1px 1px 2px rgba(255,255,255,0.5);
      text-align: center;
      transition: transform 0.3s ease;
    }
    .dark .neu-stat-card {
      background: #1A1A1E;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.35), -3px -3px 8px rgba(255,255,255,0.02), inset 1px 1px 2px rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .neu-stat-card:hover {
      transform: translateY(-2px);
    }

    .neu-timeline-node {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 0.8rem;
      font-weight: 700;
      background: #E8E8ED;
      color: var(--accent);
      box-shadow: 4px 4px 10px rgba(0,0,0,0.07), -3px -3px 8px rgba(255,255,255,0.8);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    .dark .neu-timeline-node {
      background: #222226;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.35), -3px -3px 8px rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .neu-timeline-content {
      background: #EEEEF3;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.05), -3px -3px 8px rgba(255,255,255,0.7);
      flex: 1;
    }
    .dark .neu-timeline-content {
      background: #1A1A1E;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.3), -3px -3px 8px rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
    }
  </style>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-bg-primary text-text-primary antialiased overflow-x-hidden relative">
    <!-- Animated Background Blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1] opacity-60 dark:opacity-30 mix-blend-multiply dark:mix-blend-screen transition-opacity duration-1000">
        <div class="absolute -top-[10%] -left-[10%] w-[500px] h-[500px] rounded-full bg-blue-300 dark:bg-blue-600 blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] -right-[10%] w-[600px] h-[600px] rounded-full bg-purple-200 dark:bg-purple-900 blur-[120px] animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-[20%] left-[20%] w-[700px] h-[700px] rounded-full bg-cyan-200 dark:bg-blue-800 blur-[130px] animate-blob animation-delay-4000"></div>
    </div>
    <div class="noise-bg"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;
        gsap.registerPlugin(ScrollTrigger);

        // Theme check
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- Icons ---
        const Sun = (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={props.className}><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></svg>;
        const Moon = (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg>;
        const Instagram = (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={props.className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" /></svg>;
        const Linkedin = (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect width="4" height="12" x="2" y="9" /><circle cx="4" cy="4" r="2" /></svg>;
        const ChevronDown = (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={props.className} style={props.style}><path d="m6 9 6 6 6-6" /></svg>;

        const Glow = ({ children }) => <span className="glow-underline">{children}</span>;
        const GlowHL = ({ children }) => <span className="glow-word">{children}</span>;

        const CALENDLY_LINK = "https://calendly.com/marco-brandsculptors/30min";

        // --- Primitives ---
        const Button = ({ children, variant = 'primary', href = CALENDLY_LINK, className = '', ...props }) => {
            const base = "inline-flex items-center justify-center font-semibold transition-all duration-300 ease-out rounded-[12px] px-6 py-3 cursor-pointer hover:scale-[1.02] hover:opacity-90";
            const variants = {
                primary: "bg-accent text-white hover:bg-accent-hover shadow-sm",
                secondary: "bg-transparent text-text-primary border border-border hover:bg-black/5 dark:hover:bg-white/5"
            };
            const isInternal = href.startsWith('#');
            return (
                <a href={href} target={isInternal ? undefined : "_blank"} rel={isInternal ? undefined : "noopener noreferrer"} className={`${base} ${variants[variant]} ${className}`} {...props}>
                    {children}
                </a>
            );
        };

        const Section = ({ id, className = '', children, wide }) => (
            <section id={id} className={`py-[clamp(5rem,10vh,8rem)] px-[clamp(1.5rem,5vw,6rem)] ${className} relative z-10`}>
                <div className={`${wide ? 'max-w-[1100px]' : 'max-w-[900px]'} mx-auto w-full`}>{children}</div>
            </section>
        );

        const Eyebrow = ({ children }) => (
            <span className="block text-accent text-[1.5rem] uppercase mb-6" style={{fontWeight: 900, letterSpacing: '-0.02em'}}>{children}</span>
        );

        const ThemeToggle = () => {
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            const toggle = () => {
                const next = !isDark;
                document.documentElement.classList.toggle('dark', next);
                localStorage.theme = next ? 'dark' : 'light';
                setIsDark(next);
            };
            return (
                <button onClick={toggle} className="p-2 text-text-secondary hover:text-text-primary transition-colors" aria-label="Toggle theme">
                    {isDark ? <Sun size={16} /> : <Moon size={16} />}
                </button>
            );
        };

        // --- Navbar ---
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return (
                <nav className="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-[850px]">
                    <div className={`flex items-center justify-between backdrop-blur-xl bg-bg-surface/70 dark:bg-bg-surface/50 border border-border shadow-apple rounded-full transition-all duration-300 relative overflow-hidden ${scrolled ? 'px-5 py-2' : 'px-6 py-3'}`}>
                        <div className="absolute inset-0 rounded-full border border-white/20 dark:border-white/5 pointer-events-none"></div>
                        <div className="font-bold text-text-primary tracking-tight text-lg relative z-10">Brand Sculptors</div>
                        <div className="hidden md:flex items-center gap-5 relative z-10">
                            <a href="#system" className="text-text-secondary hover:text-text-primary text-small font-medium transition-colors">The System</a>
                            <a href="#results" className="text-text-secondary hover:text-text-primary text-small font-medium transition-colors">Results</a>
                            <a href="#investment" className="text-text-secondary hover:text-text-primary text-small font-medium transition-colors">How It Works</a>
                            <a href="#faq" className="text-text-secondary hover:text-text-primary text-small font-medium transition-colors">FAQ</a>
                            <div className="w-[1px] h-4 bg-border"></div>
                            <ThemeToggle />
                        </div>
                        <div className="flex items-center gap-2 relative z-10">
                            <div className="md:hidden">
                                <ThemeToggle />
                            </div>
                            <Button href={CALENDLY_LINK} className="!py-2 !px-4 !text-sm !rounded-[12px] text-white">Book a Call</Button>
                        </div>
                    </div>
                </nav>
            );
        };

        // --- Hero ---
        const Hero = () => {
            const heroRef = useRef(null);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.fromTo('.hero-text-line', { y: '120%' }, { y: '0%', duration: 1.1, stagger: 0.15, ease: "power4.out", delay: 0.2 });
                    gsap.fromTo('.hero-anim', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.8, stagger: 0.12, ease: "power2.out", delay: 0.7 });
                }, heroRef);
                return () => ctx.revert();
            }, []);

            return (
                <section ref={heroRef} className="relative w-full min-h-[100dvh] bg-transparent flex items-center justify-center px-[clamp(1.5rem,5vw,6rem)] z-10 pt-28 pb-16">
                    <div className="max-w-[800px] w-full mx-auto text-center flex flex-col items-center">
                        <h1 className="text-display text-text-primary mb-8">
                            <span className="overflow-hidden pb-1 -mb-1 block">
                                <span className="inline-block hero-text-line translate-y-[120%]">Build a brand where <GlowHL>trust</GlowHL> compounds into qualified <GlowHL>leads</GlowHL>.</span>
                            </span>
                        </h1>

                        <p className="hero-anim opacity-0 text-body text-text-secondary max-w-[620px] mb-10 mx-auto">A done-with-you system that gives you clarity on the steps to find your voice, attract the right audience and turn your expertise into content that builds trust and converts.</p>

                        <div className="hero-anim opacity-0 w-full max-w-[700px] aspect-video rounded-[20px] overflow-hidden border border-border bg-bg-elevated shadow-apple relative mb-10">
                            <iframe className="absolute top-0 left-0 w-full h-full" src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?rel=0" title="Content Conversion System" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowFullScreen loading="lazy"></iframe>
                        </div>

                        <div className="hero-anim opacity-0 flex flex-col sm:flex-row items-center gap-4 justify-center w-full sm:w-auto mb-10">
                            <Button variant="primary" className="w-full sm:w-auto text-white">Book Your Free Content Audit</Button>
                            <Button variant="secondary" href="#system" className="w-full sm:w-auto">See How It Works</Button>
                        </div>

                        <div className="hero-anim opacity-0 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-0 text-text-secondary text-small font-medium">
                            <span>Content strategist behind 20M+ monthly impressions</span>
                            <span className="hidden sm:inline mx-3 text-text-tertiary">|</span>
                            <span>50+ funnels audited</span>
                            <span className="hidden sm:inline mx-3 text-text-tertiary">|</span>
                            <span>4 YouTube channels managed</span>
                        </div>
                    </div>
                </section>
            );
        };

        // --- Problem ---
        const Problem = () => (
            <Section className="!pt-0">
                <div className="scroll-anim">
                    <Eyebrow>THE CONTENT CONVERSION SYSTEM</Eyebrow>
                    <div className="space-y-6 text-body text-text-secondary mb-10">
                        <p>Building a content operation that actually generates leads is not about posting more or finding better hooks. It is a full system. Strategy, team structure, workflows, conversion mechanisms and a data-driven process to find out what actually works.</p>
                        <p>Most experts try to figure this out alone. They hire a social media manager who can post but cannot think strategically. They test random formats with no system to measure what converts. They create content that gets views but never connects to an offer.</p>
                    </div>
                </div>

                {/* The Cycle — Research, Adapt, Iterate, Optimize, Scale */}
                <div className="scroll-anim mb-10">
                    <div className="relative w-[320px] h-[320px] sm:w-[380px] sm:h-[380px] mx-auto">
                        {/* Circular arrow paths via SVG */}
                        <svg className="absolute inset-0 w-full h-full" viewBox="0 0 380 380" fill="none" xmlns="http://www.w3.org/2000/svg">
                            {/* Circular path arrows connecting the 5 nodes */}
                            <defs>
                                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                                    <polygon points="0 0, 8 3, 0 6" className="fill-text-tertiary" opacity="0.5" />
                                </marker>
                            </defs>
                            {/* Research → Adapt (top-right arc) */}
                            <path d="M 225 62 Q 300 90 320 160" stroke="var(--text-tertiary)" strokeWidth="1.5" strokeOpacity="0.35" fill="none" markerEnd="url(#arrowhead)" />
                            {/* Adapt → Iterate (right-bottom arc) */}
                            <path d="M 330 210 Q 310 290 250 325" stroke="var(--text-tertiary)" strokeWidth="1.5" strokeOpacity="0.35" fill="none" markerEnd="url(#arrowhead)" />
